"$schema" = 'https://starship.rs/config-schema.json'
command_timeout = 1500

format = """
[ΌΓ╢](flamingo)\
$directory\
[ΌΓ░](bg:pink fg:flamingo)\
$git_branch\
$git_status\
[ΌΓ░](fg:pink bg:mauve)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
[ΌΓ░](fg:mauve bg:teal)\
$kubernetes\
[ΌΓ░](fg:teal bg:blue)\
$conda\
[ΌΓ░](fg:blue bg:sapphire)\
$time\
[ΌΓ┤ ](fg:sapphire)\
$line_break\
$jobs\
$cmd_duration\
$status\
$character"""

palette = 'catppuccin_mocha'

[os]
disabled = true
style = "bg:red fg:crust"

[os.symbols]
Windows = "≤░Ξ▓"
Ubuntu = "≤░ΧΙ"
SUSE = ""
Raspbian = "≤░Ρ┐"
Mint = "≤░μφ"
Macos = "≤░Α╡"
Manjaro = ""
Linux = "≤░Ν╜"
Gentoo = "≤░μρ"
Fedora = "≤░μδ"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "≤░μΘ"
Artix = "≤░μΘ"
CentOS = ""
Debian = "≤░μγ"
Redhat = "≤▒Εδ"
RedHatEnterprise = "≤▒Εδ"

[username]
disabled = true
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:flamingo fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "έΑο/"

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "≤░ζγ "
"Pictures" = "ΎΑ╛ "
"Developer" = "≤░▓Μ "

[git_branch]
symbol = "ΎΡα"
style = "bg:pink"
format = '[[ $symbol $branch ](fg:crust bg:pink)]($style)'

[git_status]
style = "bg:pink"
format = '[[($all_status$ahead_behind )](fg:crust bg:pink)]($style)'

[nodejs]
symbol = "Όεα"
style = "bg:mauve"
format = '[[ $symbol( $version) ](fg:crust bg:mauve)]($style)'

[c]
symbol = "Όαη "
style = "bg:mauve"
format = '[[ $symbol( $version) ](fg:crust bg:mauve)]($style)'

[rust]
symbol = "Όηρ"
style = "bg:mauve"
format = '[[ $symbol( $version) ](fg:crust bg:mauve)]($style)'

[golang]
symbol = "Όαπ"
style = "bg:mauve"
format = '[[ $symbol( $version) ](fg:crust bg:mauve)]($style)'

[php]
symbol = "ΌαΙ"
style = "bg:mauve"
format = '[[ $symbol( $version) ](fg:crust bg:mauve)]($style)'

[java]
symbol = "ΌΚΨ "
style = "bg:mauve"
format = '[[ $symbol( $version) ](fg:crust bg:mauve)]($style)'

[kotlin]
symbol = "Όα┤"
style = "bg:mauve"
format = '[[ $symbol( $version) ](fg:crust bg:mauve)]($style)'

[haskell]
symbol = "Όαθ"
style = "bg:mauve"
format = '[[ $symbol( $version) ](fg:crust bg:mauve)]($style)'

[python]
symbol = "ΌαΗ"
style = "bg:mauve"
format = '[[ $symbol( $version)(\($virtualenv\)) ](fg:crust bg:mauve)]($style)'

[docker_context]
symbol = "ΎΝΙ"
style = "bg:mauve"
format = '[[ $symbol( $context) ](fg:crust bg:mauve)]($style)'
only_with_files = false

[kubernetes]
symbol = "έα╕ "
style = "fg:crust bg:teal"
format = '[[ $symbol$context(\($namespace\)) ](fg:crust bg:teal)]($style)'
disabled = false

[conda]
symbol = " ΎΕΝ "
style = "fg:crust bg:blue"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:sapphire"
format = '[[ ΎΡ║ $time ](fg:crust bg:sapphire)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[έζψ](bold fg:green)'
error_symbol = '[έζψ](bold fg:red)'
vimcmd_symbol = '[έζχ](bold fg:green)'
vimcmd_replace_one_symbol = '[έζχ](bold fg:mauve)'
vimcmd_replace_symbol = '[έζχ](bold fg:mauve)'
vimcmd_visual_symbol = '[έζχ](bold fg:pink)'

[jobs]
symbol = "ΌςΜ "
style = "bold fg:flamingo"
number_threshold = 1
format = '[$symbol$number]($style) '

[status]
disabled = false
style = "bold fg:red"
symbol = "ΎΒΩ "
success_symbol = ""
format = '[$symbol$status]($style) '

[cmd_duration]
show_milliseconds = false
format = "[ $duration](fg:overlay1) "
disabled = false
show_notifications = true
min_time_to_notify = 10000

