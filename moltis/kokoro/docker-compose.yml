services:
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: kokoro-tts
    restart: unless-stopped
    # Model files cached across restarts
    volumes:
      - kokoro-models:/app/api/src/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  shim:
    build:
      context: .
      dockerfile: Dockerfile.shim
    container_name: kokoro-shim
    restart: unless-stopped
    ports:
      - "8881:8881"          # Moltis coqui provider points here
    environment:
      - KOKORO_URL=http://kokoro:8880
      - DEFAULT_VOICE=af_heart   # Best quality warm voice — change to af_bella, am_michael, etc.
    depends_on:
      kokoro:
        condition: service_healthy

volumes:
  kokoro-models:             # Persists downloaded model across restarts (~300MB)
