# ╔══════════════════════════════════════╗
# ║   tmux config — 🦐🥊 傻瓜友好版      ║
# ╚══════════════════════════════════════╝

# ── 真彩色 (Claude Code TUI 必须) ────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",ghostty:RGB"

# ── 鼠标全开 (点击切换、拖拽调整大小) ───
set -g mouse on

# ── 减少按键延迟 (Claude Code 响应更快) ──
set -s escape-time 0
set -g repeat-time 300

# ── 滚动历史 ─────────────────────────────
set -g history-limit 50000

# ── 状态栏 (简洁但有用) ──────────────────
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[fg=#89b4fa,bold] 🦐 #S  "
set -g status-left-length 30
set -g status-right "#[fg=#a6adc8] %H:%M  %Y-%m-%d "
set -g status-right-length 40

# 当前窗口高亮
set -g window-status-current-style "fg=#cba6f7,bold"
set -g window-status-current-format " #I:#W "
set -g window-status-format " #I:#W "

# ── 前缀键改成 Ctrl+A (比默认 Ctrl+B 好按) ──
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── 分屏快捷键 (更直觉) ──────────────────
bind | split-window -h -c "#{pane_current_path}"   # Ctrl+A + | 左右分屏
bind - split-window -v -c "#{pane_current_path}"   # Ctrl+A + - 上下分屏
bind c new-window -c "#{pane_current_path}"         # Ctrl+A + c 新窗口

# ── 用 Alt+方向键 切换面板 (不用按前缀) ──
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── 用 Shift+方向键 切换窗口 ─────────────
bind -n S-Left  previous-window
bind -n S-Right next-window

# ── 复制模式用 vi 键位 ───────────────────
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ── 窗口编号从 1 开始 (键盘更顺手) ───────
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ── 自动重命名窗口 ────────────────────────
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"
